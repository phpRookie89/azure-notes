name: Deploy Azure Notes

on:
  push:
    branches: [master]
  workflow_dispatch:   # allows manual trigger from GitHub UI

env:
  RESOURCE_GROUP: rg-azure-notes
  FUNCTION_APP_NAME: func-notes-azn001

jobs:
  # ── Job 1: Deploy Infrastructure (Bicep) ────────────────────────
  infra:
    name: Deploy Infrastructure (Bicep)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy Bicep
        uses: azure/arm-deploy@v2
        with:
          resourceGroupName: ${{ env.RESOURCE_GROUP }}
          template: ./infra/main.bicep
          parameters: environment=dev suffix=azn001

  # ── Job 2: Build & Deploy Azure Functions ────────────────────────
  api:
    name: Build & Deploy Azure Functions
    runs-on: ubuntu-latest
    needs: infra

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: api/package-lock.json

      - name: Install & Build
        working-directory: api
        run: |
          npm ci
          npm run build

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ env.FUNCTION_APP_NAME }}
          package: api
          respect-funcignore: true
