name: Deploy Azure Notes

on:
  push:
    branches: [main]
  workflow_dispatch:   # allows manual trigger from GitHub UI

env:
  RESOURCE_GROUP: rg-azure-notes
  FUNCTION_APP_NAME: func-notes-azn001   # must match suffix in main.bicep

jobs:
  # ── Job 1: Deploy Infrastructure ────────────────────────
  infra:
    name: Deploy Infrastructure (Bicep)
    runs-on: ubuntu-latest
    outputs:
      functionAppUrl: ${{ steps.deploy.outputs.functionAppUrl }}

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
          # AZURE_CREDENTIALS secret: run `az ad sp create-for-rbac --sdk-auth` and paste output

      - name: Deploy Bicep
        id: deploy
        uses: azure/arm-deploy@v2
        with:
          resourceGroupName: ${{ env.RESOURCE_GROUP }}
          template: ./infra/main.bicep
          parameters: environment=dev suffix=azn001

  # ── Job 2: Build & Deploy API ────────────────────────────
  api:
    name: Build & Deploy Azure Functions
    runs-on: ubuntu-latest
    needs: infra

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: api/package-lock.json

      - name: Install & Build
        working-directory: api
        run: |
          npm ci
          npm run build

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ env.FUNCTION_APP_NAME }}
          package: api
          respect-funcignore: true

  # ── Job 3: Deploy Frontend ───────────────────────────────
  frontend:
    name: Deploy Frontend (Static Web App)
    runs-on: ubuntu-latest
    needs: api

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: /frontend
          skip_api_build: true
